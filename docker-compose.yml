services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: lucio_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped

  app:
    build: .
    container_name: lucio_app
    depends_on:
      - qdrant
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - QDRANT_HOST=qdrant
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"

volumes:
  qdrant_data:
