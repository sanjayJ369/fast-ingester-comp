services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: lucio_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: lucio_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    container_name: lucio_e2e
    depends_on:
      - qdrant
      - ollama
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - QDRANT_HOST=qdrant
      - OLLAMA_BASE_URL=http://ollama:11434
      - LLM_BACKEND=ollama
      - OLLAMA_MODEL=${OLLAMA_MODEL:-mistral}
    volumes:
      - ./data:/app/data
      - "./Testing Set:/app/Testing Set"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # GPU FAISS benchmark service — file-based, does not need Qdrant
  # Run with: docker compose --profile faiss up faiss-app
  faiss-app:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    container_name: lucio_faiss_bench
    depends_on:
      - ollama
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OLLAMA_BASE_URL=http://ollama:11434
      - LLM_BACKEND=ollama
      - OLLAMA_MODEL=${OLLAMA_MODEL:-mistral}
      - VECTOR_BACKEND=faiss
    volumes:
      - ./data:/app/data
      - "./Testing Set:/app/Testing Set"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles:
      - faiss

volumes:
  qdrant_data:
  ollama_data:
